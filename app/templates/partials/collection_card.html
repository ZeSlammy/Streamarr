<div class="col" id="collection-{{ c.collection_id }}">
  <div class="card">
    <div class="row g-0">
      <div class="col-4">
        {% if c.poster_path %}
          <img src="https://image.tmdb.org/t/p/w300{{ c.poster_path }}"
               class="img-fluid rounded-start"
               style="aspect-ratio: 2/3; object-fit: cover; width: 100%;"
               alt="{{ c.name }}">
        {% else %}
          <div class="cover-placeholder rounded-start" style="height: 100%; aspect-ratio: 2/3;">
            <i class="bi bi-collection-play"></i>
          </div>
        {% endif %}
      </div>
      <div class="col-8">
        <div class="card-body d-flex flex-column h-100">
          <h6 class="card-title mb-2">{{ c.name }}</h6>
          <div class="mb-2">
            <span class="badge bg-info text-dark me-1">
              {{ c.available_count }} / {{ c.tmdb_total_parts }} available
            </span>
            {% if c.in_library_count %}
              <span class="badge bg-success">{{ c.in_library_count }} in library</span>
            {% endif %}
          </div>
          <div class="mt-auto d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm"
                    hx-get="/collections/{{ c.collection_id }}/parts"
                    hx-target="#parts-{{ c.collection_id }}"
                    hx-swap="innerHTML">
              <i class="bi bi-chevron-down me-1"></i>Show films
            </button>
            {% if c.available_count > c.in_library_count %}
              <button class="btn btn-primary btn-sm"
                      hx-post="/collections/{{ c.collection_id }}/add-all"
                      hx-target="#toast-container"
                      hx-swap="innerHTML">
                <i class="bi bi-bookmark-plus me-1"></i>Add all available
              </button>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
    <div id="parts-{{ c.collection_id }}" class="px-3 pb-3"></div>
  </div>
</div>
