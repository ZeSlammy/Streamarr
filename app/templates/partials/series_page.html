{% for s in series_list %}
  {% include "partials/series_card.html" %}
{% endfor %}
{% if has_more %}
  <div class="col-12 text-center py-3"
       hx-get="/browse/results?offset={{ next_offset }}&q={{ q | urlencode }}&category_id={{ category_id | urlencode }}&audio_lang={{ audio_lang | urlencode }}&sub_lang={{ sub_lang | urlencode }}"
       hx-trigger="intersect once"
       hx-swap="outerHTML">
    <div class="spinner-border spinner-border-sm text-secondary"></div>
    <span class="text-muted ms-2">Loading more…</span>
  </div>
{% endif %}
