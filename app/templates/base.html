<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Streamarr{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .card-series { transition: transform .15s; }
    .card-series:hover { transform: translateY(-3px); }
    .cover-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
    .cover-placeholder { width: 100%; aspect-ratio: 2/3; background: #2a2a2a; display:flex; align-items:center; justify-content:center; color:#555; font-size:2rem; }
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; min-width: 280px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-play-circle-fill text-primary me-2"></i>Streamarr</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/browse"><i class="bi bi-search me-1"></i>Browse</a></li>
        <li class="nav-item"><a class="nav-link" href="/my-shows"><i class="bi bi-bookmark-heart me-1"></i>My Shows</a></li>
        <li class="nav-item"><a class="nav-link" href="/movies"><i class="bi bi-film me-1"></i>Movies</a></li>
        <li class="nav-item"><a class="nav-link" href="/collections"><i class="bi bi-collection-play me-1"></i>Collections</a></li>
        <li class="nav-item"><a class="nav-link" href="/settings"><i class="bi bi-gear me-1"></i>Settings</a></li>
      </ul>
      <button class="btn btn-success btn-sm"
              hx-post="/sync"
              hx-target="#toast-container"
              hx-swap="innerHTML">
        <i class="bi bi-arrow-repeat me-1"></i>Sync Now
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

<div id="modal-container"></div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
<script>
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'toast-container') {
      document.querySelectorAll('#toast-container .toast').forEach(function(el) {
        new bootstrap.Toast(el, { delay: 4000 }).show();
      });
    }
  });
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
